<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MaNGA Compare Viewer</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel panel-meta">
        <div class="panel-head">
          <h1>MaNGA Compare Viewer</h1>
          <p>Comparacion entre productos MaNGA reales y cubos mock manga-like</p>
        </div>

        <label class="field-label" for="file-select">Archivo FITS</label>
        <select id="file-select"></select>

        <div class="toolbar">
          <button id="overview-button" class="active" type="button">Mapa Medio</button>
          <button id="slice-button" type="button">Slice Actual</button>
        </div>

        <label class="field-label" for="slice-slider">Indice espectral</label>
        <input id="slice-slider" type="range" min="0" max="0" value="0" />
        <p id="slice-label">-</p>

        <div id="meta-grid" class="meta-grid"></div>
      </section>

      <section class="panel panel-map">
        <div class="panel-head">
          <h2>Mapa 2D</h2>
          <p id="map-caption">Selecciona un archivo para comenzar</p>
        </div>
        <canvas id="map-canvas" width="640" height="640"></canvas>
        <div class="legend">
          <span>Bajo</span>
          <div class="legend-bar"></div>
          <span>Alto</span>
        </div>
      </section>

      <section class="panel panel-spectrum">
        <div class="panel-head">
          <h2>Espectro</h2>
          <p id="selection-caption">Todavia no hay seleccion</p>
        </div>

        <div class="toolbar toolbar-small">
          <label><input id="toggle-error" type="checkbox" checked /> Error</label>
          <label><input id="toggle-gas" type="checkbox" checked /> Gas</label>
          <label><input id="toggle-mask" type="checkbox" checked /> Mascara</label>
        </div>

        <svg id="spectrum-svg" viewBox="0 0 860 420" preserveAspectRatio="xMidYMid meet"></svg>
        <div id="selection-meta" class="meta-grid"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
  </html>

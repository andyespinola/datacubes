data:
  data_dir: ../data
  morphology_catalog: ../data/morphs_kinematic_bars.hdf5
  stellar_circularities: ../data/stellar_circs.hdf5
  potential_cache_dir: ../data/potential_cache
  ssp_template: ../kinematic_moments/templates/MaStar_CB19.slog_1_5.fits.gz
  output_dir: outputs
  local_galaxy_ids:
    - TNG50-87-155298
    - TNG50-87-192324
  file_ifu_design: 127

extractor:
  align_radius_factor: 2.0
  max_particles: 250000
  random_seed: 42
  use_potential_cache: true
  require_potential_cache: false
  energy_bins: 64
  jc_percentile: 95.0

classifier:
  disk_epsilon_midpoint: 0.25
  disk_epsilon_scale: 5.0
  z_scale_reff: 0.75
  bulge_radius_scale_reff: 0.60
  prior_strength: 0.55

bar_detector:
  epsilon_min: 0.15
  epsilon_max: 0.75
  z_max_reff: 0.25
  a2_threshold: 0.15
  phi_tolerance_rad: 0.7853981633974483
  catalog_strength_min: 0.05
  max_transfer_fraction: 0.65
  radial_inner_fraction: 0.15

arm_detector:
  min_disk_prob: 0.30
  grid_size: 128
  residual_threshold: 0.35
  min_island_area: 12
  smooth_sigma_pixels: 1.25
  radial_profile_percentile: 55.0
  min_radius_reff: 0.50
  max_radius_reff: 4.00
  max_transfer_fraction: 0.50

projection:
  output_shape: [69, 69]
  psf_enabled: true
  align_to_pipe3d: true
  alignment_reference_map: stellar_mass_density_log10

mask:
  min_particles_per_spaxel: 5
  snr_window_angstrom: [5000.0, 5500.0]
  min_snr: 1.0
  min_island_area: 10
  closing_iterations: 1

packer:
  pad_to_shape: [74, 74]
  compression: lzf
  include_cube: true
  include_pipe3d: true

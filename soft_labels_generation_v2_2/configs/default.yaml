# Configuración base del pipeline v2 (los defaults también viven en los
# pydantic configs de cada módulo; este YAML documenta y permite overrides).

extractor:
  align_radius_factor: 2.0
  potential_method: auto      # snapshot > octree (auto usa snapshot si hay Potential)
  n_jc_bins: 200
  octree_theta: 0.6
  octree_leafsize: 32
  softening_kpc: 0.288        # softening estelar TNG50-1 z<1

classifier:
  method: gmm
  n_components: 3
  feature_set: paper4d        # alternativo: standard3d (ablación)
  log_radius_delta: 0.05
  epsilon_init_thresholds:
    disk_min: 0.5
    bulge_max: 0.3
    halo_max: -0.3
  bulge_radial_max_reff: 1.0
  seed: 42
  prior_confidence: 0.5       # α del prior MORDOR; nunca 1.0

bar_detector:
  epsilon_min: 0.3
  epsilon_max: 0.6
  z_max_kpc: 0.5
  a2_threshold: 0.3
  phi_tolerance_rad: 0.785

arm_detector:
  min_disk_prob: 0.3
  fine_grid_size: 256
  map_extent_kpc: 30.0
  residual_threshold: 0.3
  min_island_area: 20
  min_azimuthal_extent_deg: 30.0

label_projection:
  binning: cic
  r_cov_factor: 1.5           # R_cov = max(min(1.5·R_eff, R_IFU), R_IFU)

mask_builder:
  min_particles_per_spaxel: 30
  snr_window_angstrom: [5000.0, 5500.0]
  min_snr: 3.0
  min_island_area: 10
  closing_radius: 1

quality_check:
  fraction_tolerance: 0.10
  min_valid_fraction: 0.30
  max_uncertainty_p95: 0.5

packer:
  include_qa: true
  include_pipe3d: true
  compression: lzf
  target_size: 74             # padding 69→74 centrado
